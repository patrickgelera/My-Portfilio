  <circle cx="110" cy="111" r="5" fill="#0d1117"/>
  <rect x="108" y="111" width="4" height="8" rx="1" fill="#0d1117"/>
  <!-- CompTIA text -->
  <text x="110" y="155" text-anchor="middle"
